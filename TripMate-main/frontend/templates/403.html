{% extends 'base.html' %}
{% load static %}
{% block content %}
<section class="page-shell">
  <div class="container">
    <div class="error-card text-center py-5">
      <div class="error-code mb-4">
        <h1 class="display-1 font-weight-bold text-warning">403</h1>
      </div>
      <div class="error-message">
        <h2 class="mb-3">Access Forbidden</h2>
        <p class="text-muted mb-4">You don't have permission to access this resource. Please log in or contact support.</p>
        <a href="{% url 'home' %}" class="btn btn-primary btn-lg">Go Back Home</a>
      </div>
    </div>
  </div>
</section>
<style>
  .error-card {
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    border-radius: 10px;
    padding: 60px 20px;
    margin: 50px auto;
  }
  .error-code h1 {
    font-size: 120px;
    line-height: 1;
    margin: 0;
  }
  .error-message h2 {
    color: #333;
    font-weight: 600;
  }
</style>
{% endblock %}
